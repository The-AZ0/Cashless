<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Consignación</title>

    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- PRELOADER -->
<div id="preloader">
    <img src="img/loading.gif" alt="Cargando">
    <p>Cargando sistema...</p>
</div>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <img src="img/logo.png" class="logo" alt="Logo">
        <h2>🔎 Validador de Consignación</h2>
        <p class="subtitulo">Verifica si un cliente está en consignación</p>
    </div>

    <!-- FORM -->
    <div class="form">
        <label for="codigo">Código del cliente</label>

        <div class="input-group">
            <span class="icono">🔢</span>
            <input type="number" id="codigo" placeholder="Ej: 12706514">
        </div>

        <button id="btnValidar">Validar Código</button>
    </div>

    <!-- RESULTADO -->
    <div id="resultado"></div>

    <!-- FOOTER -->
    <div class="footer">
        <p>Total de clientes de consignación</p>
        <strong id="totalClientes">2011</strong>
    </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
