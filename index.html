<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Consignación</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- PRELOADER -->
<div id="preloader">
    <img src="img/loading.gif" alt="Cargando">
    <p>Cargando sistema...</p>
</div>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <img src="img/logo.png" class="logo">
        <h1>🔎 Validador de Consignación</h1>
    </div>

    <!-- FORM -->
    <div class="form">
        <p>Ingrese el código del cliente:</p>
        <input type="number" id="codigo" placeholder="Ej: 12345">
        <button id="btnValidar">Validar Código</button>
    </div>

    <!-- RESULTADO -->
    <div id="resultado"></div>

    <!-- FOOTER -->
    <div class="footer">
        Total de clientes: <strong>2011</strong>
    </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
